<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Set Your Password | filings4u Portal</title>
    <script src="https://jsdelivr.net"></script>
    <link rel="stylesheet" href="assets/css/site-elite.css">
    <style>
        .auth-card { max-width: 400px; margin: 100px auto; background: white; padding: 40px; border-radius: 24px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: var(--navy); margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); box-sizing: border-box; }
        .btn-main { background: var(--navy); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: 700; width: 100%; cursor: pointer; }
    </style>
</head>
<body style="background: var(--ice);">

    <div class="auth-card">
        <h2 style="margin-top: 0;">Set Your Password</h2>
        <p style="color: #64748b; font-size: 0.9rem; margin-bottom: 30px;">Create a secure password to access your filing portal.</p>

        <form id="updateForm">
            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="newPassword" placeholder="Minimum 8 characters" required minlength="8">
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Repeat password" required>
            </div>
            <button type="submit" class="btn-main">Save Password & Login →</button>
        </form>

        <p id="msg" style="margin-top: 20px; font-size: 0.9rem; text-align: center; color: #e53e3e;"></p>
    </div>

    <script>
        const supabase = supabase.createClient('https://lrbimrlbskjweynxlgas.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxyYmltcmxic2tqd2V5bnhsZ2FzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MjQ0NTYsImV4cCI6MjA5NDEwMDQ1Nn0.I8fQ6ZjA9oaTqJCF-7Z7vUboXC8zv2cogBv4PC_1ihU');

        document.getElementById('updateForm').onsubmit = async (e) => {
            e.preventDefault();
            const pass = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;
            const msg = document.getElementById('msg');

            if (pass !== confirm) {
                msg.innerText = "Passwords do not match.";
                return;
            }

            msg.style.color = "var(--navy)";
            msg.innerText = "Updating...";

            // Update the user's password using the session from the email link
            const { error } = await supabase.auth.updateUser({ password: pass });

            if (error) {
                msg.style.color = "#e53e3e";
                msg.innerText = error.message;
            } else {
                msg.style.color = "var(--emerald)";
                msg.innerText = "Success! Redirecting...";
                setTimeout(() => window.location.href = 'portal-dashboard.html', 1500);
            }
        };
    </script>
</body>
</html>
