<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | filings4u</title>
    <link rel="stylesheet" href="assets/css/site-elite.css">
</head>
<body style="background: var(--ice);">

<div style="text-align: center; padding: 60px 0 20px;">
    <a href="index.html"><img src="images/logo.png" alt="filings4u" style="height: 35px;"></a>
</div>

<main style="max-width: 450px; margin: 0 auto; background: white; padding: 50px; border-radius: 24px; border: 1px solid var(--border);">
    <h2 style="margin-bottom: 10px;">Recover Access</h2>
    <p style="font-size: 0.9rem; color: var(--text-gray); margin-bottom: 25px;">Enter your email and we will send you a secure link to reset your password.</p>
    
    <form id="resetForm">
        <div style="margin-bottom: 20px;">
            <label style="display:block; font-size:0.7rem; font-weight:800; text-transform:uppercase; margin-bottom:8px;">Email Address</label>
            <input type="email" id="resetEmail" required style="width:100%; padding:14px; border-radius:8px; border:1px solid var(--border);">
        </div>
        <button type="submit" id="resetBtn" class="btn-main" style="width:100%;">Send Reset Link →</button>
    </form>
    
    <div style="margin-top: 25px; text-align: center;">
        <a href="login.html" style="font-size: 0.85rem; color: var(--navy); font-weight: 700; text-decoration: none;">Back to Login</a>
    </div>
</main>

<script src="https://gstatic.com"></script>
<script src="https://gstatic.com"></script>

<script>
    const firebaseConfig = { /* PASTE YOUR CONFIG HERE */ };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    document.getElementById('resetForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const email = document.getElementById('resetEmail').value;
        const btn = document.getElementById('resetBtn');

        btn.innerText = "Sending...";
        
        auth.sendPasswordResetEmail(email)
            .then(() => {
                alert("Success! Check your inbox for the reset link.");
                window.location.href = "login.html";
            })
            .catch((error) => {
                alert("Error: " + error.message);
                btn.innerText = "Send Reset Link →";
            });
    });
</script>
</body>
</html>
