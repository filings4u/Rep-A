    border-radius: 16px;
    box-shadow: 0 25px 50px -12px rgba(15,23,42,0.15);
    border: 1px solid var(--border-gray);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    margin: 20px auto;
    min-height: 650px;
    box-sizing: border-box;
    position: relative;
  }

  .wizard-field-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    text-align: left;
  }

  .wizard-label {
    font-size: 0.88rem;
    font-weight: 700;
    color: var(--text-dark);
  }

  .wizard-input, .wizard-select {
    padding: 12px;
    border: 1px solid #cbd5e1;
    border-radius: 6px;
    font-size: 0.95rem;
    width: 100%;
    box-sizing: border-box;
    transition: border 0.15s;
  }

  .wizard-input:focus, .wizard-select:focus {
    border-color: var(--brand-emerald);
    outline: none;
  }

  .upsell-card {
    border: 2px dashed #cbd5e1;
    background: #ffffff;
    padding: 16px;
    border-radius: 8px;
    text-align: left;
    cursor: pointer;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    transition: all 0.2s;
  }

  .upsell-checkbox {
    width: 18px;
    height: 18px;
    margin-top: 3px;
    cursor: pointer;
    accent-color: var(--brand-emerald);
  }

  .summary-box {
    background: var(--bg-slate);
    border: 1px solid var(--border-gray);
    border-radius: 8px;
    padding: 20px;
    text-align: left;
  }

  .summary-row {
    display: flex;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px dashed var(--border-gray);
    font-size: 0.95rem;
  }

  .summary-row:last-child {
    border-bottom: 0;
  }

  /* 🎯 FIXED FLAT INTEGRATED STRIPE IFRAME STYLING WITH NO BORDER OR FRAME OUTLINES */
  #stripe-card-element {
    background: transparent;
    padding: 12px 0;
    border: 0;
    border-radius: 0;
    box-sizing: border-box;
    width: 100%;
  }

  .signature-input-font {
    font-family: 'Brush Script MT', cursive;
    font-size: 1.65rem !important;
    color: #1e3a8a !important;
    padding: 10px 14px;
    border: 1px solid #cbd5e1;
    border-radius: 6px;
    background: #fff;
    width: 100%;
    box-sizing: border-box;
  }

  .wizard-helper-text {
    font-size: 0.78rem;
    font-weight: 600;
    color: #475569;
    line-height: 1.4;
    margin-top: 4px;
    display: block;
  }

  .crm-btn {
    transition: all 0.15s ease-in-out;
    user-select: none;
  }

  .crm-btn:hover {
    opacity: 0.9;
    transform: translateY(-1px);
  }

  .crm-btn:active {
    transform: translateY(0);
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

    // 💳 STRIPE CONTROLLER LIFECYCLE MANAGEMENT
  function initializeStripeElementsObjectInstance() {
    if (typeof Stripe === "undefined") return;
    if (!stripeInstance) stripeInstance = Stripe('pk_test_replace_with_your_actual_key');
    
    var elements = stripeInstance.elements();
    
    // 🎯 FLAT STYLE CONFIGURATION: Integrates natively without a boxed container frame
    stripeCardElementInstance = elements.create('card', {
      style: {
        base: {
          fontSize: '16px',
          color: '#334155',
          fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif',
          '::placeholder': { color: '#94a3b8' }
        }
      }
    });
    
    setTimeout(function() {
      if (document.getElementById('stripe-card-element')) {
        stripeCardElementInstance.mount('#stripe-card-element');
      }
    }, 50);
  }

    // 🚀 ROUTING PIPELINE SUBMISSION INTERFACE WITH EXPANDED ACCOUNTING MATRIX
  async function handleWizardFormStepNavigation(event) {
    event.preventDefault();
    const client = window.supabaseClient || window.supabase;
    const feedback = document.getElementById("wizardFeedbackTray");
    const nextBtn = document.getElementById("wizNextBtn");
    if (!feedback || !nextBtn) return;

    const totalStepsCountMap = activeServiceData.stepsCount + 5;
    if (activeWizardStepIndex < totalStepsCountMap) {
      navigateWizardStepsCounter(1);
      return;
    }

    if (!client) {
      feedback.style.color = "#c15254";
      feedback.textContent = "Database Error: Supabase client connection unavailable.";
      return;
    }

    nextBtn.disabled = true;
    nextBtn.textContent = "Processing Secured Funds Escrow...";
    feedback.style.color = "var(--brand-navy)";
    feedback.textContent = "Syncing transactional schemas across tracking dashboards...";

    try {
      const clientEmail = wizardCollectedFormPayloadData["wiz_client_email"];
      
      // 📊 TRANSACTION FEES LIFECYCLE AUDITOR 
      let runningTotalAccumulator = activeServiceData.basePrice + FILINGS4U_SERVICE_FEE;
      
      // Apply the official Secretary of State filing registry fee metrics
      const currentSelectedFormationState = wizardCollectedFormPayloadData["wiz_formation_state"] || "";
      const applicableRegistryStateFee = US_STATES_FILING_FEES_REGISTRY[currentSelectedFormationState] || 0.00;
      runningTotalAccumulator += applicableRegistryStateFee;

      // Apply the conditional annual Registered Agent network operational coverage fee
      const currentAgentCoverageSelection = wizardCollectedFormPayloadData["wiz_ra_choice"] || "yes";
      if (currentAgentCoverageSelection === "yes") {
        runningTotalAccumulator += FILINGS4U_REGISTERED_AGENT_PRICE;
      }
      
      // Apply chosen additional compliance cross-upsells catalog items
      GLOBAL_UPSELLS_CATALOG.forEach(item => {
        if (wizardCollectedFormPayloadData[`upsell_${item.id}`]) {
          runningTotalAccumulator += item.price;
        }
      });

      // Generate automatic temporary passcode credentials array
      const temporaryPasswordString = "LAUNCH_PASS_" + Math.random().toString(36).slice(-8).toUpperCase();

      // Step 1: Initialize account schemas within the secure auth ledger
      let userIdUuid = '00000000-0000-0000-0000-000000000000';
      try {
        const { data: authData } = await client.auth.signUp({ email: clientEmail, password: temporaryPasswordString });
        if (authData && authData.user) userIdUuid = authData.user.id;
      } catch (_) {}

      // Step 2: Push audited records to master database orders matrix
      const { error: dbError } = await client
        .from('orders')
        .insert({
          user_id: userIdUuid,
          company_name: wizardCollectedFormPayloadData["wiz_company_name"] || "Walk-In Corporate Lead",
          service: activeServiceName,
          service_title: activeServiceName,
          requirement_name: activeServiceName,
          total_fee: runningTotalAccumulator,
          status: 'Fulfillment Lane',
          tax_id_status: 'Fulfillment Lane',
          collected_payload_metadata: wizardCollectedFormPayloadData,
          poa_signed_state: true,
          poa_signature_verification_string: wizardCollectedFormPayloadData["poa_signature_text"] || "ELECTRONIC SIGNATURE",
          created_at: new Date().toISOString()
        });

      if (dbError) throw dbError;

      // Step 3: Clear workspace to display clean success layout view
      renderPremiumInteractiveReceiptPage(temporaryPasswordString);
    } catch (err) {
      console.error("Fulfillment engine checkout failure:", err.message);
      feedback.style.color = "#c15254";
      feedback.textContent = "Transaction Aborted: " + err.message;
      nextBtn.disabled = false;
    }
  }

d Packet 📥</button> </div> <a href="portal-login.html" class="crm-btn primary" style="width:100%; text-align:center; padding:14px; font-weight:800; border-radius:6px; box-sizing:border-box; margin-top:10px; text-decoration:none; display:block; background:var(--brand-emerald); color:#fff;">Access Dashboard Portal ➔</a> </div>`;

   // ⏱️ REAL-TIME MATRIX SYSTEM PORTAL CLOCK
  function initializePremiumWizardClock() {
    const cb = document.getElementById("wizard-portal-clock");
    if (!cb) return;
    setInterval(() => {
      const n = new Date();
      const d = String(n.getDate()).padStart(2, '0');
      const m = String(n.getMonth() + 1).padStart(2, '0');
      const y = n.getFullYear();
      let hr = n.getHours();
      const ampm = hr >= 12 ? 'PM' : 'AM';
      hr = hr % 12;
      hr = hr ? hr : 12;
      const hrs = String(hr).padStart(2, '0');
      const mins = String(n.getMinutes()).padStart(2, '0');
      const secs = String(n.getSeconds()).padStart(2, '0');
      cb.textContent = m + "/" + d + "/" + y + " | " + hrs + ":" + mins + ":" + secs + " " + ampm;
    }, 1000);
  }
