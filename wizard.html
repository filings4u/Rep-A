// 📨 TRANSMIT CUSTOMER TERMINAL MESSAGES & SIMULATE COMPLIANCE AGENT RESPONSES
window.transmitChatMessageFromTerminal = function() {
    const msgInput = document.getElementById("chatTerminalMessageInput");
    const history = document.getElementById("chatMessageHistoryContainer");
    if (!msgInput || !msgInput.value.trim() || !history) return;

    const userText = msgInput.value.trim();
    msgInput.value = ""; // Clear input immediately

    // 1. Render User Chat Bubble
    const userBubble = document.createElement("div");
    userBubble.style.cssText = "align-self:flex-end; background:var(--brand-emerald); color:#fff; padding:10px 14px; border-radius:12px 12px 0 12px; max-width:85%; font-size:0.85rem; font-weight:600; line-height:1.4; word-break:break-word;";
    userBubble.textContent = userText;
    history.appendChild(userBubble);
    history.scrollTop = history.scrollHeight;

    // 2. Prevent concurrent typing animations
    if (document.getElementById("chatSystemTypingIndicatorBubble")) return;

    // 3. Render Agent Typing Indicator Dot-Stream
    const typingBubble = document.createElement("div");
    typingBubble.id = "chatSystemTypingIndicatorBubble";
    typingBubble.style.cssText = "align-self:flex-start; background:#e2e8f0; color:#64748b; padding:10px 14px; border-radius:12px 12px 12px 0; max-width:85%; font-size:0.85rem; font-style:italic; font-weight:500;";
    typingBubble.textContent = "Agent is typing...";
    
    // Simulate a natural delay before appending the indicator
    setTimeout(() => {
        history.appendChild(typingBubble);
        history.scrollTop = history.scrollHeight;

        // 4. Fire the Formal Agent Response String
        setTimeout(() => {
            // Remove the typing indicator cleanly
            const targetIndicator = document.getElementById("chatSystemTypingIndicatorBubble");
            if (targetIndicator) targetIndicator.remove();

            const agentBubble = document.createElement("div");
            agentBubble.style.cssText = "align-self:flex-start; background:#e2e8f0; color:var(--brand-navy); padding:10px 14px; border-radius:12px 12px 12px 0; max-width:85%; font-size:0.85rem; font-weight:500; line-height:1.4; word-break:break-word;";
            
            // Tailor the fallback agent scripts relative to context keywords
            const simplifiedLowerInput = userText.toLowerCase();
            if (simplifiedLowerInput.includes("error") || simplifiedLowerInput.includes("payment") || simplifiedLowerInput.includes("card")) {
                agentBubble.innerHTML = "I am pulling up your checkout payment gateway reference trace right now. Please keep this session open—our secure terminal confirms data elements are locked and ready for verification.";
            } else if (simplifiedLowerInput.includes("poa") || simplifiedLowerInput.includes("document") || simplifiedLowerInput.includes("download")) {
                agentBubble.innerHTML = "Your Limited Power of Attorney document generation parameters are fully secured. Once the wizard checkout completes successfully, your localized data matrix will unlock your .TXT download links instantly.";
            } else {
                agentBubble.innerHTML = "Got it. I am actively reviewing your business profile metrics in our corporate filing lane logs. Let's finish the wizard fields form step so we can sync this submission data directly to the corporate registry.";
            }

            history.appendChild(agentBubble);
            history.scrollTop = history.scrollHeight;
        }, 1800); // 1.8 second delay for the response text to print
    }, 400); // 0.4 second delay for the typing indicator to pop up
};


// 💳 CHARGE THE CARD IMMEDIATELY ON CLICK WITH NO REDIRECT
async function handleInlinePaymentSubmission() {
    const feedback = document.getElementById("wizardFeedbackTray");
    const paymentTargetDomElement = document.getElementById("stripe-embedded-checkout-mount-target");

    if (!window.globalStripeElementsInstance || !stripeInstance) {
        console.error("Stripe gateway instances are uninitialized.");
        return false;
    }

    if (!paymentTargetDomElement || paymentTargetDomElement.offsetHeight === 0) {
        console.error("Stripe Element container is unmounted or hidden.");
        feedback.style.color = "#c15254";
        feedback.textContent = "Payment field is not ready. Please try again.";
        return false;
    }

    try {
        const result = await stripeInstance.confirmPayment({
            elements: window.globalStripeElementsInstance,
            redirect: "if_required", 
            confirmParams: {
                return_url: `${window.location.origin}/wizard.html?fallback=true`,
            },
        });

        // ❌ Check if Stripe explicitly rejected the card inputs
        if (result.error) {
            feedback.style.color = "#c15254";
            feedback.textContent = result.error.message;
            return false;
        }

        // ✅ 🎯 CRITICAL FIXED CHECK: If there is no error, the payment succeeded inline!
        console.log("Stripe inline card evaluation completed successfully.");
        
        // Safely extract the intent reference token string if available
        if (result.paymentIntent) {
            wizardCollectedFormPayloadData["stripe_payment_token_id"] = result.paymentIntent.id;
        } else {
            wizardCollectedFormPayloadData["stripe_payment_token_id"] = "tok_inline_succeeded_" + Math.random().toString(36).slice(-6);
        }
        
        return true; 

    } catch (catchErr) {
        console.error("Stripe payment capture exception:", catchErr);
        feedback.style.color = "#c15254";
        feedback.textContent = "Payment connection interrupted. Please try again.";
        return false;
    }
}
