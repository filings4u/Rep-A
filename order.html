<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Summary | filings4u</title>
    <link rel="stylesheet" href="assets/css/site-elite.css">
    <style>
        .summary-card { max-width: 600px; margin: 60px auto; background: white; padding: 40px; border-radius: 24px; border: 1px solid var(--border); box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        .item-row { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #f1f5f9; }
        .total { font-size: 1.4rem; font-weight: 800; margin-top: 25px; color: var(--navy); display: flex; justify-content: space-between; }
        .btn-pay { width: 100%; background: var(--emerald); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 30px; font-size: 1.1rem; }
    </style>
</head>
<body style="background: var(--ice);">

    <div class="summary-card">
        <h2>Order Review</h2>
        <p style="color: var(--text-gray);">Please confirm your filing details before payment.</p>

        <div id="summaryList">
            <!-- Data from Wizard will appear here -->
        </div>

        <div class="total">
            <span>Total Due:</span>
            <span id="priceDisplay">$0.00</span>
        </div>

        <button class="btn-pay" onclick="handleCheckout()" id="payButton">Complete Order & Setup Portal →</button>
    </div>

    <!-- Stripe.js SDK -->
    <script src="https://stripe.com"></script>
    <script>
        // 1. Get data from the Wizard session
        const orderData = JSON.parse(sessionStorage.getItem('pendingOrder'));
        if (!orderData) window.location.href = 'index.html';

        // 2. Show details on screen
        const list = document.getElementById('summaryList');
        const displayFields = {
            'service_type': 'Service',
            'company_name': 'Company',
            'customer_email': 'Contact Email'
        };

        Object.keys(displayFields).forEach(key => {
            list.innerHTML += `
                <div class="item-row">
                    <span style="color: var(--text-gray)">${displayFields[key]}</span>
                    <strong>${orderData[key]}</strong>
                </div>`;
        });

        document.getElementById('priceDisplay').innerText = `$${orderData.price}.00`;

        // 3. Initiate Checkout
        async function handleCheckout() {
            const btn = document.getElementById('payButton');
            btn.innerText = "Opening Secure Checkout...";
            btn.disabled = true;

            // Replace with your STRIPE PUBLISHABLE KEY (pk_test_...)
            const stripe = Stripe('pk_test_YOUR_PUBLISHABLE_KEY');

            // In production, you will call a script to create a "Checkout Session"
            // For now, this is where you link to your Stripe Payment Link 
            // OR call your backend to get a sessionId.
            alert("Redirecting to Stripe... \nMetadata: " + orderData.company_name);
            
            // Example: window.location.href = "YOUR_STRIPE_PAYMENT_LINK_URL?prefilled_email=" + orderData.customer_email;
        }
    </script>
</body>
</html>
